apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylite-weather-api
  labels:
    app.kubernetes.io/name: skylite-weather
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: skylite-weather
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skylite-weather
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
      - name: aliyun-registry-login-secret
      containers:
      - name: skylite-weather-api
        image: crpi-a20te69e34l8yeun.ap-southeast-1.personal.cr.aliyuncs.com/skylite/skylite-weather-api:latest
        args:
        - gunicorn
        - --bind
        - 0.0.0.0:8000
        - --workers
        - "1"
        - --timeout
        - "60"
        - --max-requests
        - "1000"
        - --max-requests-jitter
        - "100"
        - --access-logfile
        - "-"
        - --forwarded-allow-ips=*
        - weather_service.wsgi:application
        ports:
        - name: http
          containerPort: 8000
        envFrom:
        - configMapRef:
            name: skylite-weather-config
        - secretRef:
            name: skylite-weather-secrets
        env:
        - name: MALLOC_ARENA_MAX
          value: "2"
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /healthz/
            port: http
          failureThreshold: 60
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz/
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
